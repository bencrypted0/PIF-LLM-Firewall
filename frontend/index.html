<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PIF Agent — Local AI Powered by Ollama</title>
  <meta name="description" content="A local AI agent built with LangGraph and Ollama. No cloud, no tracking — fully private intelligence." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Ambient Background -->
  <div class="bg-ambient">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- App Shell -->
  <div class="app-shell">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-icon">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
              <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
              <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
            </svg>
          </div>
          <span class="logo-text">PIF Agent</span>
        </div>
        <button class="sidebar-toggle" id="sidebarToggle" title="Toggle sidebar">
          <svg viewBox="0 0 24 24" fill="none"><path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>

      <button class="new-chat-btn" id="newChatBtn">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        New Conversation
      </button>

      <div class="sidebar-section">
        <span class="sidebar-label">Model Status</span>
        <div class="status-card" id="statusCard">
          <div class="status-indicator" id="statusDot"></div>
          <div class="status-info">
            <span class="status-model" id="statusModel">Checking...</span>
            <span class="status-url" id="statusUrl"></span>
          </div>
        </div>
      </div>

      <div class="sidebar-section">
        <span class="sidebar-label">Available Models</span>
        <div class="models-list" id="modelsList">
          <span class="models-loading">Loading models...</span>
        </div>
      </div>


    </aside>

    <!-- Main Chat Area -->
    <main class="chat-area">

      <!-- Top Bar -->
      <header class="chat-header">
        <button class="mobile-toggle" id="mobileToggle" title="Toggle sidebar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="9" y1="3" x2="9" y2="21"></line>
          </svg>
        </button>
        <div class="chat-title">
          <h1>AI Agent</h1>
          <span class="chat-subtitle" id="chatSubtitle">Ready to assist</span>
        </div>
        <div class="header-actions">
          <button class="icon-btn" id="themeToggleBtn" title="Toggle theme">
            <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
          </button>
          <button class="icon-btn" id="clearBtn" title="Clear conversation">
            <svg viewBox="0 0 24 24" fill="none"><path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </header>

      <!-- Messages Container -->
      <div class="messages-container" id="messagesContainer">
        <!-- Welcome State -->
        <div class="welcome-state" id="welcomeState">
          <div class="welcome-icon">
            <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 2C12 2 12.5 7.5 14.5 9.5C16.5 11.5 22 12 22 12C22 12 16.5 12.5 14.5 14.5C12.5 16.5 12 22 12 22C12 22 11.5 16.5 9.5 14.5C7.5 14.5 2 14 2 12C2 12 7.5 11.5 9.5 9.5C11.5 7.5 12 2 12 2Z"/>
              <path d="M6 3C6 3 6.2 4.8 7 5.5C7.8 6.2 9.5 6.5 9.5 6.5C9.5 6.5 7.8 6.8 7 7.5C6.2 8.2 6 10 6 10C6 10 5.8 8.2 5 7.5C4.2 6.8 2.5 6.5 2.5 6.5C2.5 6.5 4.2 6.2 5 5.5C5.8 4.8 6 3 6 3Z" opacity="0.7"/>
            </svg>
          </div>
          <h2>Ask our AI anything</h2>
          <div class="suggestion-container">
            <span class="suggestion-label">Suggestions on what to ask Our AI</span>
            <div class="suggestion-chips">
              <button class="suggestion-chip" data-prompt="What can I ask you to do?">
                What can I ask you to do?
              </button>
              <button class="suggestion-chip" data-prompt="Which one of my projects is performing the best?">
                Which one of my projects is performing the best?
              </button>
              <button class="suggestion-chip" data-prompt="What projects should I be concerned about right now?">
                What projects should I be concerned about right now?
              </button>
            </div>
          </div>
        </div>

        <!-- Messages will be appended here -->
        <div class="messages-list" id="messagesList"></div>
      </div>

      <!-- Input Area -->
      <footer class="input-area">
        <div class="input-wrapper">
          <textarea
            id="messageInput"
            class="message-input"
            placeholder="Message the agent..."
            rows="1"
            autocomplete="off"
          ></textarea>
          <button class="send-btn" id="sendBtn" disabled>
            <svg id="sendIcon" viewBox="0 0 24 24" fill="none">
              <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <svg id="stopIcon" viewBox="0 0 24 24" fill="none" style="display:none">
              <rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor"/>
            </svg>
          </button>
        </div>
        <div class="input-footer">
          <span>Press <kbd>Enter</kbd> to send · <kbd>Shift+Enter</kbd> for new line</span>
          <span id="charCount" class="char-count"></span>
        </div>
      </footer>

    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
