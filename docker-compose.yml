services:
  ollama:
      image: ollama/ollama:latest
      container_name: ollama
      ports:
        - "11434:11434"
      volumes:
        - ollama_data:/root/.ollama
      logging:
        driver: "none"
      deploy:
        resources:
          reservations:
            devices:
              - driver: nvidia
                count: all
                capabilities: [gpu]
      restart: unless-stopped
      healthcheck:
        test: ["CMD", "ollama", "list"]
        interval: 5s
        timeout: 5s
        retries: 10

  pull-models:
    image: ollama/ollama:latest
    container_name: ollama-pull-models
    environment:
      - OLLAMA_HOST=${OLLAMA_BASE_URL}
    logging:
      driver: "none"
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting for Ollama daemon to start...';
      until ollama list >/dev/null 2>&1; do
        sleep 2;
      done;
      echo 'Ollama is ready. Pulling models...';
      echo 'Pulling qwen3.5:0.8b...';
      ollama pull qwen3.5:0.8b;
      echo 'Pulling llama3.2:latest...';
      ollama pull llama3.2:latest;
      echo 'Pulling nomic-embed-text...';
      ollama pull nomic-embed-text;
      echo 'All models pulled successfully!';
      "
    depends_on:
      ollama:
        condition: service_healthy

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pif-agent-backend
    ports:
      - "${PORT}:8000"
    volumes:
      - ./documents:/app/documents
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - OLLAMA_MODEL=${OLLAMA_MODEL}
      - QDRANT_URL=${QDRANT_URL}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL}
      - HOST=${HOST}
      - PORT=${PORT}
    depends_on:
      ollama:
        condition: service_healthy
      qdrant:
        condition: service_started
      pull-models:
        condition: service_completed_successfully
    restart: unless-stopped

  firewall:
    build:
      context: ./firewall
      dockerfile: Dockerfile
    container_name: pif-agent-firewall
    environment:
      - BACKEND_URL=${BACKEND_URL}
    depends_on:
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pif-agent-frontend
    ports:
      - "80:80"
    depends_on:
      - firewall
    restart: unless-stopped

volumes:
  ollama_data:
  qdrant_data:
